 
 <!-- Quick Quiz:
    Without using br tag, write a vertically aligned form asking for name, city and pincode of a user.
    Everyone must comment -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets learn it</title>
</head>

<body>
   
    <form action="post">
        <div>
            <label for="username">Enter your Name</label>
            <input type="text" id="username" name="username" placeholder="Enter your Name" autofocus>
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

          <div>
        <h3> Select your City</h3>
            <select name="City">
                <option value="Noakhali">Noakhali</option>
                <option value="Dhaka">Dhaka</option>
                <option value="Cumilla">Cumilla</option>
          </select>
        </div>
        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea id="comment" name="comment" rows="3" cols="20"></textarea>
        </div>
      
    </form>
</body>

</html>
