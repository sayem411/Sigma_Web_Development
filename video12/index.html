<!DOCTYPE html>
<html lang="en">
<head>
    <title>Media Gallery</title>
</head>
<body>
 <!-- You are given 12 files; 6 audio and 6 video.
    Design a website using HTML only which shows these 12 files.
    1.mp3, 2.mp3 .... 6.mp3
    1.mp4, 2.mp4 .... 6.mp4 -->

    <h1>Media Files</h1>

    <h3>Audio Files</h3>
    <ol>
        <li><audio src="1.mp3" controls></audio></li>
        <li><audio src="2.mp3" controls></audio></li>
        <li><audio src="3.mp3" controls></audio></li>
        <li><audio src="4.mp3" controls></audio></li>
        <li><audio src="5.mp3" controls></audio></li>
        <li><audio src="6.mp3" controls></audio></li>
    </ol>

    <h3>Video Files</h3>
    <ol>
        <li><video src="1.mp4" width="200" controls></video></li>
        <li><video src="2.mp4" width="200" controls></video></li>
        <li><video src="3.mp4" width="200" controls></video></li>
        <li><video src="4.mp4" width="200" controls></video></li>
        <li><video src="5.mp4" width="200" controls></video></li>
        <li><video src="6.mp4" width="200" controls></video></li>
    </ol>

</body>
</html>
